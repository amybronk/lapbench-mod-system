board = adafruit_qtpy_esp32s3_n4r2
framework = arduino
lib_deps = 
	4-20ma/ModbusMaster@^2.0.1
	madhephaestus/ESP32Encoder@^0.12.0
	fastled/FastLED@^3.10.3


compilation_db_dir = .